<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>stalog — Personal Journal</title>

    <link rel="icon" href="stalog_logo_favi.png">
    <link rel="apple-touch-icon" href="stalog_logo_favi.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="stalog">

    <meta property="og:type" content="website">
    <meta property="og:title" content="stalog">
    <meta property="og:description" content="A minimalist personal journal to keep track of your global footsteps.">
    <meta property="og:image" content="stalog_logo_favi.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        serif: ['"Playfair Display"', '"Noto Serif JP"', 'serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'zoom-in': 'zoomIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        zoomIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { 
            display: none; 
        }
        
        .page-flip-next { animation: flipNext 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; transform-origin: left center; transform-style: preserve-3d; }
        @keyframes flipNext { 0% { transform: perspective(1200px) rotateY(0deg); } 100% { transform: perspective(1200px) rotateY(-180deg); } }
        
        .page-flip-prev { animation: flipPrev 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; transform-origin: left center; transform-style: preserve-3d; }
        @keyframes flipPrev { 0% { transform: perspective(1200px) rotateY(-180deg); } 100% { transform: perspective(1200px) rotateY(0deg); } }
        
        .page-front, .page-back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .page-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="m-0 font-serif bg-[#F9F8F6] text-[#3b3a36] antialiased">
    <div id="initial-loader" class="fixed inset-0 flex flex-col justify-center items-center bg-[#F9F8F6] z-[9999] transition-opacity duration-500">
        <div class="w-6 h-6 border-2 border-[#E5E2DA] border-t-[#3b3a36] rounded-full animate-spin mb-6"></div>
        <p class="font-sans text-[10px] tracking-[0.3em] uppercase text-[#8c8a82] animate-pulse">
            Loading stalog
        </p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COUNTRIES = ["Japan", "United States", "Canada", "United Kingdom", "France", "Italy", "Spain", "Germany", "Australia", "New Zealand", "South Korea", "Taiwan", "Thailand", "Singapore", "Vietnam", "Switzerland", "Austria", "Sweden", "Finland", "Others"];
        const JAPAN_PREFECTURES = ["Hokkaido", "Aomori", "Iwate", "Miyagi", "Akita", "Yamagata", "Fukushima", "Ibaraki", "Tochigi", "Gunma", "Saitama", "Chiba", "Tokyo", "Kanagawa", "Niigata", "Toyama", "Ishikawa", "Fukui", "Yamanashi", "Nagano", "Gifu", "Shizuoka", "Aichi", "Mie", "Shiga", "Kyoto", "Osaka", "Hyogo", "Nara", "Wakayama", "Tottori", "Shimane", "Okayama", "Hiroshima", "Yamaguchi", "Tokushima", "Kagawa", "Ehime", "Kochi", "Fukuoka", "Saga", "Nagasaki", "Kumamoto", "Oita", "Miyazaki", "Kagoshima", "Okinawa"];
        const US_STATES = ["New York", "California", "Hawaii", "Florida", "Texas", "Illinois", "Pennsylvania", "Ohio", "Georgia", "North Carolina", "Michigan", "New Jersey", "Virginia", "Washington", "Arizona", "Massachusetts", "Tennessee", "Indiana", "Missouri", "Maryland", "Wisconsin", "Colorado", "Minnesota", "South Carolina", "Alabama", "Louisiana", "Kentucky", "Oregon", "Oklahoma", "Connecticut", "Utah", "Iowa", "Nevada", "Arkansas", "Mississippi", "Kansas", "New Mexico", "Nebraska", "Idaho", "West Virginia", "District of Columbia", "Others"];
        const CA_PROVINCES = ["Ontario", "Quebec", "British Columbia", "Alberta", "Manitoba", "Saskatchewan", "Nova Scotia", "New Brunswick", "Newfoundland and Labrador", "Prince Edward Island", "Northwest Territories", "Nunavut", "Yukon"];

        const COVER_COLORS = [
            { id: 'charcoal', value: '#3b3a36', name: 'Charcoal' },
            { id: 'navy', value: '#1c2841', name: 'Navy' },
            { id: 'wine', value: '#4a1c1c', name: 'Wine' },
            { id: 'olive', value: '#2b331f', name: 'Olive' },
            { id: 'leather', value: '#4a2c11', name: 'Leather' },
        ];

        const COVER_DESIGNS = [
            { id: 'plain', name: 'Plain' },
            { id: 'logo', name: 'Minimal' },
            { id: 'emblem', name: 'Emblem' },
        ];

        const formatDate = (dateString) => {
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const d = new Date(dateString);
            return isNaN(d.getTime()) ? "" : `${d.getDate().toString().padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
        };

        const generateStampStyle = () => {
            const types = ['type-1', 'type-2', 'type-3', 'type-4', 'type-5', 'type-6'];
            const colors = ['border-[#3b3a36] text-[#3b3a36]', 'border-[#5A4D41] text-[#5A4D41]', 'border-[#4A5D6B] text-[#4A5D6B]', 'border-[#525945] text-[#525945]', 'border-[#724840] text-[#724840]'];
            return {
                type: types[Math.floor(Math.random() * types.length)],
                rotation: 0,
                colorClass: colors[Math.floor(Math.random() * colors.length)],
            };
        };

        const Icon = ({ name, size = 16, strokeWidth = 1.5, className = "" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                chevronLeft: <path d="m15 18-6-6 6-6" />,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const Stamp = ({ record }) => {
            const [isHovered, setIsHovered] = useState(false);
            const { colorClass } = record.style;
            
            // 以前の枠線データがある場合は安全に type-1 に変換
            const type = record.style.type?.startsWith('type-') ? record.style.type : 'type-1';
            
            const shapeClass = "w-[clamp(85px,24vw,120px)] h-[clamp(85px,24vw,120px)] sm:w-32 sm:h-32 md:w-44 md:h-44 flex flex-col justify-center items-center ";

            const countryName = record.country;
            let fontSizeClass = "text-[length:clamp(10px,2.8vw,14px)] sm:text-xs md:text-lg tracking-wider";
            if (countryName.length >= 13) fontSizeClass = "text-[length:clamp(7px,1.8vw,10px)] sm:text-[9px] md:text-xs tracking-tighter";
            else if (countryName.length >= 11) fontSizeClass = "text-[length:clamp(8px,2.2vw,11px)] sm:text-[11px] md:text-sm tracking-tight";
            else if (countryName.length >= 9) fontSizeClass = "text-[length:clamp(9px,2.5vw,13px)] sm:text-xs md:text-base tracking-normal";

            return (
                <div 
                    className="relative flex justify-center items-center p-2 sm:p-4 transition-transform duration-500 select-none cursor-pointer" 
                    style={{ transform: `rotate(0deg) scale(${isHovered ? 1.05 : 1}) translateZ(0)` }}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    onContextMenu={(e) => e.preventDefault()}
                >
                    <div className={`relative flex text-center p-1 sm:p-2 opacity-80 ${shapeClass} ${colorClass}`}>
                        {/* 外部SVGをmaskとして読み込み、文字色(bg-current)で塗りつぶす */}
                        <div 
                            className="absolute inset-0 w-full h-full pointer-events-none bg-current"
                            style={{
                                WebkitMaskImage: `url(${type}.svg)`,
                                maskImage: `url(${type}.svg)`,
                                WebkitMaskSize: 'contain',
                                maskSize: 'contain',
                                WebkitMaskRepeat: 'no-repeat',
                                maskRepeat: 'no-repeat',
                                WebkitMaskPosition: 'center',
                                maskPosition: 'center'
                            }}
                        />
                        <div className="relative z-10 flex flex-col items-center justify-center w-full h-full">
                            <span className="text-[length:clamp(7px,1.8vw,10px)] sm:text-[9px] md:text-[11px] tracking-widest uppercase mb-0.5 sm:mb-1 opacity-70 font-sans">Visas</span>
                            <h3 className={`font-bold leading-tight uppercase px-1 pb-0.5 sm:pb-1 ${fontSizeClass}`}>{record.country}</h3>
                            {record.subRegion && <span className="text-[length:clamp(8px,2vw,11px)] sm:text-[11px] md:text-xs italic mt-0.5 sm:mt-1 px-1 sm:px-2">{record.subRegion}</span>}
                            <span className="text-[length:clamp(7px,1.8vw,10px)] sm:text-[9px] md:text-[11px] tracking-wider mt-1 sm:mt-2 font-mono">{formatDate(record.date)}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const ListItem = ({ record, index, total, onEdit }) => {
            const timerRef = useRef(null);
            const posRef = useRef(null);

            const handlePressStart = (e) => {
                posRef.current = { 
                    x: e.touches ? e.touches[0].clientX : e.clientX, 
                    y: e.touches ? e.touches[0].clientY : e.clientY 
                };
                timerRef.current = setTimeout(() => {
                    onEdit();
                }, 600);
            };

            const handlePressMove = (e) => {
                if (!posRef.current || !timerRef.current) return;
                const currentX = e.touches ? e.touches[0].clientX : e.clientX;
                const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                if (Math.abs(currentX - posRef.current.x) > 10 || Math.abs(currentY - posRef.current.y) > 10) {
                    clearTimeout(timerRef.current);
                    timerRef.current = null;
                }
            };

            const handlePressEnd = () => {
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                    timerRef.current = null;
                }
                posRef.current = null;
            };

            return (
                <div 
                    className="flex justify-between items-center py-3 sm:py-4 border-b border-[#E5E2DA]/60 transition-all select-none cursor-pointer"
                    onTouchStart={handlePressStart}
                    onTouchMove={handlePressMove}
                    onTouchEnd={handlePressEnd}
                    onMouseDown={handlePressStart}
                    onMouseMove={handlePressMove}
                    onMouseUp={handlePressEnd}
                    onMouseLeave={handlePressEnd}
                    onContextMenu={(e) => e.preventDefault()}
                >
                    <div className="flex items-baseline gap-2 sm:gap-4">
                        <span className="text-[9px] text-[#b5b3aa] font-sans w-4 text-right">{total - index}</span>
                        <div className="flex flex-col sm:flex-row sm:items-baseline gap-0.5 sm:gap-1">
                            <span className="text-[length:clamp(12px,3.5vw,16px)] sm:text-sm md:text-base tracking-wider uppercase">{record.country}</span>
                            {record.subRegion && <span className="text-[length:clamp(8px,2vw,11px)] sm:text-[10px] italic text-[#8c8a82] sm:ml-1">{record.subRegion}</span>}
                        </div>
                    </div>
                    <div className="flex items-center">
                        <span className="font-mono text-[length:clamp(8px,2vw,11px)] sm:text-[10px] text-[#5A4D41]">{formatDate(record.date)}</span>
                    </div>
                </div>
            );
        };

        const CoverDesign = ({ color, design, title, subtitle }) => {
            if (design === 'plain') return null;

            return (
                <div className="absolute inset-0 flex flex-col justify-center items-center text-[#d4af37] opacity-80 text-center mix-blend-plus-lighter pointer-events-none p-6">
                    {design === 'emblem' && (
                        <div className="flex flex-col items-center">
                            <svg className="w-[clamp(64px,18vw,80px)] h-[clamp(64px,18vw,80px)] sm:w-20 sm:h-20 md:w-24 md:h-24 mb-6" viewBox="0 0 193.92 176.67" fill="currentColor">
                                <path d="M193.77,51.62c-15.98,2.13-20.55,20.52-27.4,32.53-8.85,15.53-21.54,26.08-38.34,32.24-11.74,4.31-24.15,5.36-36.02,9.46-27.78,9.6-50.34,29.42-69.75,50.81,7.18-19.67,22.51-35.98,37.9-49.73-3.09.64-6.18,1.36-9.31,1.82-13.33,1.96-36.38,3.77-49.2.54-.66-.17-1.48.01-1.66-.94,23.49-3.61,48.24-8.29,69.82-18.54,13.56-6.45,31.88-17.36,28.14-35.1-3.28-15.56-23.89-22.67-36.21-29.64C43.81,34.92,26.87,20.16,20.38,0c4.04,1.77,7.82,4.12,11.86,5.9,10.36,4.57,22.11,7.91,33.14,10.44,22.13,5.08,52.45,7.47,68.47,25.33,1.17,1.3,5.41,7.76,6.25,8,2.68.78,9.83-6.19,12.4-7.82,9.23-5.86,20.36-6.91,28.26,1.71.87.94,1.12,2.41,2.14,3.07,1.42.92,5.27,1.17,7.4,2.07.51.22,4.4,2.03,3.47,2.92ZM133.61,76.25c9.9-30.49-23.92-43.85-47.85-47.36l13.22,8.33c6.16,4.98,12.29,11.14,14.7,18.93,8.27,26.77-18.56,48.16-36.45,63.2,27.95-6.58,58.58-6.17,77.15-31.57,8.19-11.21,11.53-25.3,21.87-34.73-19.85-4.41-26.94,17.23-42.64,23.2Z"/>
                            </svg>
                            {title && <h1 className="text-[length:clamp(16px,4.5vw,22px)] sm:text-xl md:text-2xl tracking-[0.4em] uppercase font-light mb-2">{title}</h1>}
                            {subtitle && <p className="text-[length:clamp(6px,1.6vw,9px)] sm:text-[7px] md:text-[8px] tracking-widest uppercase opacity-70 font-sans">{subtitle}</p>}
                        </div>
                    )}
                    {design === 'logo' && (
                        <div className="flex flex-col items-center">
                            <svg className="w-[clamp(64px,18vw,80px)] h-[clamp(64px,18vw,80px)] sm:w-20 sm:h-20 md:w-24 md:h-24" viewBox="0 0 193.92 176.67" fill="currentColor">
                                <path d="M193.77,51.62c-15.98,2.13-20.55,20.52-27.4,32.53-8.85,15.53-21.54,26.08-38.34,32.24-11.74,4.31-24.15,5.36-36.02,9.46-27.78,9.6-50.34,29.42-69.75,50.81,7.18-19.67,22.51-35.98,37.9-49.73-3.09.64-6.18,1.36-9.31,1.82-13.33,1.96-36.38,3.77-49.2.54-.66-.17-1.48.01-1.66-.94,23.49-3.61,48.24-8.29,69.82-18.54,13.56-6.45,31.88-17.36,28.14-35.1-3.28-15.56-23.89-22.67-36.21-29.64C43.81,34.92,26.87,20.16,20.38,0c4.04,1.77,7.82,4.12,11.86,5.9,10.36,4.57,22.11,7.91,33.14,10.44,22.13,5.08,52.45,7.47,68.47,25.33,1.17,1.3,5.41,7.76,6.25,8,2.68.78,9.83-6.19,12.4-7.82,9.23-5.86,20.36-6.91,28.26,1.71.87.94,1.12,2.41,2.14,3.07,1.42.92,5.27,1.17,7.4,2.07.51.22,4.4,2.03,3.47,2.92ZM133.61,76.25c9.9-30.49-23.92-43.85-47.85-47.36l13.22,8.33c6.16,4.98,12.29,11.14,14.7,18.93,8.27,26.77-18.56,48.16-36.45,63.2,27.95-6.58,58.58-6.17,77.15-31.57,8.19-11.21,11.53-25.3,21.87-34.73-19.85-4.41-26.94,17.23-42.64,23.2Z"/>
                            </svg>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [records, setRecords] = useState([]);
            const [coverColor, setCoverColor] = useState(COVER_COLORS[0].value);
            const [coverDesign, setCoverDesign] = useState(COVER_DESIGNS[2].id);
            const [coverTitle, setCoverTitle] = useState("Passport");
            const [coverSubtitle, setCoverSubtitle] = useState("stalog Personal Journal");
            const [isLoaded, setIsLoaded] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            const [country, setCountry] = useState('');
            const [customCountry, setCustomCountry] = useState('');
            const [subRegion, setSubRegion] = useState('');
            const [date, setDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [stampType, setStampType] = useState('random');
            
            const [currentPage, setCurrentPage] = useState(0); 
            const [flipState, setFlipState] = useState(null);
            const [activeTab, setActiveTab] = useState('journal');
            const fileInputRef = useRef(null);

            const ITEMS_PER_SPREAD = 6;

            const sortRecordsDesc = (arr) => {
                return [...arr].sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
            };

            useEffect(() => {
                if (activeTab === 'journal' || isModalOpen) {
                    document.body.style.overflow = 'hidden';
                    document.documentElement.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                    document.documentElement.style.overflow = '';
                }
                return () => {
                    document.body.style.overflow = '';
                    document.documentElement.style.overflow = '';
                };
            }, [activeTab, isModalOpen]);

            useEffect(() => {
                const savedLog = localStorage.getItem('zara-travel-log');
                if (savedLog) {
                    setRecords(sortRecordsDesc(JSON.parse(savedLog)));
                }
                
                const savedCover = localStorage.getItem('stalog-cover-settings');
                if (savedCover) {
                    const { color, design, title, subtitle } = JSON.parse(savedCover);
                    if (color) setCoverColor(color);
                    if (design) setCoverDesign(design);
                    if (title !== undefined) setCoverTitle(title);
                    if (subtitle !== undefined) setCoverSubtitle(subtitle);
                }

                setIsLoaded(true);
                
                const loader = document.getElementById('initial-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, []);

            const saveCoverSettings = (color, design, title, subtitle) => {
                setCoverColor(color);
                setCoverDesign(design);
                setCoverTitle(title);
                setCoverSubtitle(subtitle);
                localStorage.setItem('stalog-cover-settings', JSON.stringify({ color, design, title, subtitle }));
            };

            const openNewModal = () => {
                setEditingRecord(null);
                setCountry('');
                setCustomCountry('');
                setSubRegion('');
                setDate(new Date().toISOString().split('T')[0]);
                setStampType('random');
                setIsModalOpen(true);
            };

            const openEditModal = (record) => {
                setEditingRecord(record);
                if (COUNTRIES.includes(record.country)) {
                    setCountry(record.country);
                    setCustomCountry('');
                } else {
                    setCountry('Others');
                    setCustomCountry(record.country);
                }
                setSubRegion(record.subRegion || '');
                const d = new Date(record.date);
                setDate(isNaN(d.getTime()) ? new Date().toISOString().split('T')[0] : d.toISOString().split('T')[0]);
                setStampType(record.style.type || 'random');
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingRecord(null);
            };

            const handleAdd = (e) => {
                e.preventDefault();
                const finalCountry = country === 'Others' ? customCountry : country;
                if (!finalCountry.trim()) return;

                if (editingRecord) {
                    const updatedRecord = {
                        ...editingRecord,
                        country: finalCountry,
                        subRegion: ["Japan", "United States", "Canada"].includes(country) ? subRegion : '',
                        date,
                        style: {
                            ...editingRecord.style,
                            type: stampType === 'random' ? editingRecord.style.type : stampType
                        }
                    };
                    const newRecords = sortRecordsDesc(records.map(r => r.id === editingRecord.id ? updatedRecord : r));
                    setRecords(newRecords);
                    localStorage.setItem('zara-travel-log', JSON.stringify(newRecords));
                } else {
                    const generatedStyle = generateStampStyle();
                    if (stampType !== 'random') {
                        generatedStyle.type = stampType;
                    }
                    const newRecord = {
                        id: crypto.randomUUID(),
                        country: finalCountry,
                        subRegion: ["Japan", "United States", "Canada"].includes(country) ? subRegion : '',
                        date,
                        style: generatedStyle
                    };
                    const newRecords = sortRecordsDesc([newRecord, ...records]);
                    setRecords(newRecords);
                    localStorage.setItem('zara-travel-log', JSON.stringify(newRecords));
                    setCurrentPage(1);
                    setActiveTab('journal');
                }
                
                setCountry(''); setCustomCountry(''); setSubRegion(''); setDate(new Date().toISOString().split('T')[0]);
                setStampType('random');
                setIsModalOpen(false);
                setEditingRecord(null);
            };

            const handleRemove = (id) => {
                const filtered = records.filter(r => r.id !== id);
                setRecords(filtered);
                localStorage.setItem('zara-travel-log', JSON.stringify(filtered));
            };

            const handleExport = () => {
                const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `stalog-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm("既存のデータを上書きしますか？")) {
                                const sorted = sortRecordsDesc(imported);
                                setRecords(sorted);
                                localStorage.setItem('zara-travel-log', JSON.stringify(sorted));
                                setCurrentPage(0); setActiveTab('journal');
                            }
                        }
                    } catch (e) { alert("不正なファイルです。"); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const totalStampPages = Math.max(1, Math.ceil(records.length / ITEMS_PER_SPREAD));
            const totalPages = totalStampPages + 1; 

            const nextPage = () => {
                if (currentPage >= totalPages - 1 || flipState) return;
                setFlipState({ direction: 'next', from: currentPage, to: currentPage + 1 });
                setTimeout(() => { setCurrentPage(p => p + 1); setFlipState(null); }, 600);
            };
            const prevPage = () => {
                if (currentPage <= 0 || flipState) return;
                setFlipState({ direction: 'prev', from: currentPage, to: currentPage - 1 });
                setTimeout(() => { setCurrentPage(p => p - 1); setFlipState(null); }, 600);
            };

            const handleNotebookClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                if (x > rect.width / 2) {
                    nextPage();
                } else {
                    prevPage();
                }
            };

            const stampPositions = [
                { left: '30%', top: '22%' }, { left: '70%', top: '22%' },
                { left: '30%', top: '50%' }, { left: '70%', top: '50%' },
                { left: '30%', top: '78%' }, { left: '70%', top: '78%' },
            ];

            const PageContent = ({ pageIndex }) => {
                if (pageIndex === 0) {
                    return <CoverDesign color={coverColor} design={coverDesign} title={coverTitle} subtitle={coverSubtitle} />;
                }

                const start = (pageIndex - 1) * ITEMS_PER_SPREAD;
                const pageRecords = records.slice(start, start + ITEMS_PER_SPREAD);

                return (
                    <div className="absolute inset-0 overflow-hidden w-full h-full pointer-events-none">
                        <div className="absolute bottom-6 right-6 md:bottom-8 md:right-8 opacity-[0.06] flex items-center justify-center pointer-events-none">
                            <svg className="w-12 h-12 md:w-16 md:h-16 text-[#3b3a36]" viewBox="0 0 193.92 176.67" fill="currentColor">
                                <path d="M193.77,51.62c-15.98,2.13-20.55,20.52-27.4,32.53-8.85,15.53-21.54,26.08-38.34,32.24-11.74,4.31-24.15,5.36-36.02,9.46-27.78,9.6-50.34,29.42-69.75,50.81,7.18-19.67,22.51-35.98,37.9-49.73-3.09.64-6.18,1.36-9.31,1.82-13.33,1.96-36.38,3.77-49.2.54-.66-.17-1.48.01-1.66-.94,23.49-3.61,48.24-8.29,69.82-18.54,13.56-6.45,31.88-17.36,28.14-35.1-3.28-15.56-23.89-22.67-36.21-29.64C43.81,34.92,26.87,20.16,20.38,0c4.04,1.77,7.82,4.12,11.86,5.9,10.36,4.57,22.11,7.91,33.14,10.44,22.13,5.08,52.45,7.47,68.47,25.33,1.17,1.3,5.41,7.76,6.25,8,2.68.78,9.83-6.19,12.4-7.82,9.23-5.86,20.36-6.91,28.26,1.71.87.94,1.12,2.41,2.14,3.07,1.42.92,5.27,1.17,7.4,2.07.51.22,4.4,2.03,3.47,2.92ZM133.61,76.25c9.9-30.49-23.92-43.85-47.85-47.36l13.22,8.33c6.16,4.98,12.29,11.14,14.7,18.93,8.27,26.77-18.56,48.16-36.45,63.2,27.95-6.58,58.58-6.17,77.15-31.57,8.19-11.21,11.53-25.3,21.87-34.73-19.85-4.41-26.94,17.23-42.64,23.2Z"/>
                            </svg>
                        </div>
                        
                        {pageRecords.length === 0 && pageIndex === 1 ? (
                            <div className="absolute inset-0 flex flex-col justify-center items-center text-[#8c8a82] opacity-50 px-4 text-center">
                                <p className="text-xs tracking-widest uppercase mb-2">No entries yet</p>
                                <p className="text-[10px] font-sans mb-1">Click + to add a stamp.</p>
                                <p className="text-[8px] font-sans opacity-70">Tap right to flip page.</p>
                            </div>
                        ) : (
                            pageRecords.map((record, idx) => (
                                <div 
                                    key={record.id} 
                                    className="absolute flex justify-center items-center transition-all duration-700 ease-in-out" 
                                    style={{ left: stampPositions[idx % 6].left, top: stampPositions[idx % 6].top, transform: 'translate(-50%, -50%)' }}
                                >
                                    <Stamp record={record} />
                                </div>
                            ))
                        )}
                    </div>
                );
            };

            const getPageBackgroundStyle = (index) => {
                if (index === 0) {
                    return { backgroundColor: coverColor, className: "shadow-[inset_15px_0_20px_-15px_rgba(0,0,0,0.3)]" };
                }
                return { backgroundColor: '#fff', className: "bg-white shadow-[inset_15px_0_20px_-15px_rgba(0,0,0,0.05)]" };
            };
            const getPageBackStyle = (index) => {
                if (index === 0) {
                    return { backgroundColor: '#fff', className: "bg-white border-l border-[#e0ddcd] shadow-[inset_-15px_0_20px_-15px_rgba(0,0,0,0.05)]" };
                }
                return { backgroundColor: '#fff', className: "bg-white border-l border-[#e0ddcd] shadow-[inset_-15px_0_20px_-15px_rgba(0,0,0,0.05)]" };
            };

            if (!isLoaded) return null;

            return (
                <div className="min-h-screen pb-24 flex flex-col items-center px-4 relative overflow-x-hidden animate-fade-in">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden opacity-[0.02] flex justify-center items-center z-0">
                         <div className="w-[150%] h-[150%] border-[40px] border-[#3b3a36] rounded-full mix-blend-multiply blur-xl"></div>
                    </div>

                    {activeTab === 'journal' && !isModalOpen && (
                        <button onClick={openNewModal} className="fixed top-4 right-4 md:top-8 md:right-8 w-10 h-10 md:w-12 md:h-12 flex justify-center items-center border border-[#3b3a36] rounded-full text-[#3b3a36] hover:bg-[#3b3a36] hover:text-white transition-all duration-500 z-[9999] bg-white shadow-sm cursor-pointer"><Icon name="plus" size={20} /></button>
                    )}

                    {activeTab === 'journal' && (
                        <div className="w-full max-w-5xl flex flex-col flex-grow relative z-10 justify-center">
                            <div className="relative w-full px-2 sm:px-8 flex items-center justify-center flex-grow py-4">
                                <div className={`w-[88vw] max-w-[380px] sm:max-w-[420px] md:max-w-[480px] aspect-[3/4] min-h-[450px] max-h-[75vh] bg-white shadow-2xl rounded-r-xl rounded-l-sm relative border border-[#E5E2DA] border-l-[#d5d2c4] overflow-hidden mx-auto cursor-pointer`} 
                                    onClick={handleNotebookClick}
                                >
                                    
                                    <div className="absolute inset-0 z-10" style={{ transformStyle: 'preserve-3d' }}>
                                        <div className={`absolute inset-0 ${getPageBackgroundStyle(flipState?.direction === 'next' ? flipState.to : (flipState?.direction === 'prev' ? flipState.from : currentPage)).className}`}
                                             style={{ backgroundColor: getPageBackgroundStyle(flipState?.direction === 'next' ? flipState.to : (flipState?.direction === 'prev' ? flipState.from : currentPage)).backgroundColor }}
                                        >
                                            <PageContent pageIndex={flipState?.direction === 'next' ? flipState.to : (flipState?.direction === 'prev' ? flipState.from : currentPage)} />
                                        </div>
                                    </div>

                                    {flipState && (
                                        <div className="absolute inset-0 flex z-30 pointer-events-none perspective-[1200px]">
                                            {flipState.direction === 'next' ? (
                                                <div className="absolute inset-0 page-flip-next">
                                                    <div className={`page-front ${getPageBackgroundStyle(flipState.from).className}`} style={{ backgroundColor: getPageBackgroundStyle(flipState.from).backgroundColor }}>
                                                        <PageContent pageIndex={flipState.from} />
                                                    </div>
                                                    <div className={`page-back ${getPageBackStyle(flipState.from).className}`} style={{ backgroundColor: getPageBackStyle(flipState.from).backgroundColor }}>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="absolute inset-0 page-flip-prev">
                                                    <div className={`page-front ${getPageBackgroundStyle(flipState.to).className}`} style={{ backgroundColor: getPageBackgroundStyle(flipState.to).backgroundColor }}>
                                                        <PageContent pageIndex={flipState.to} />
                                                    </div>
                                                    <div className={`page-back ${getPageBackStyle(flipState.to).className}`} style={{ backgroundColor: getPageBackStyle(flipState.to).backgroundColor }}>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div className="absolute left-0 top-0 bottom-0 w-[1px] bg-[#d5d2c4] z-40 mix-blend-multiply"></div>
                                    <div className="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-[rgba(0,0,0,0.06)] to-transparent z-40 pointer-events-none"></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && (
                        <div className="w-full max-w-4xl bg-white shadow-2xl p-6 sm:p-12 border border-[#E5E2DA] animate-fade-in z-10 my-8">
                            <header className="mb-6 mt-4 text-center relative">
                                <p className="text-[7px] md:text-[8px] tracking-[0.3em] uppercase text-[#8c8a82] mb-2 font-sans">Index</p>
                                <h2 className="text-lg md:text-xl tracking-widest font-light lowercase">destinations</h2>
                                
                                {records.length > 0 && (
                                    <div className="flex justify-center items-center gap-8 mt-6 mb-4 text-[#3b3a36]">
                                        <div className="text-center">
                                            <p className="text-xl md:text-2xl font-serif leading-none">{records.length}</p>
                                            <p className="text-[6px] md:text-[7px] tracking-[0.2em] uppercase font-sans text-[#8c8a82] mt-2">Trips</p>
                                        </div>
                                        <div className="w-[1px] h-6 bg-[#E5E2DA]"></div>
                                        <div className="text-center">
                                            <p className="text-xl md:text-2xl font-serif leading-none">{new Set(records.map(r => r.country)).size}</p>
                                            <p className="text-[6px] md:text-[7px] tracking-[0.2em] uppercase font-sans text-[#8c8a82] mt-2">Countries</p>
                                        </div>
                                    </div>
                                )}
                            </header>
                            <div className="grid grid-cols-1 max-w-2xl mx-auto w-full pt-2">
                                {records.length === 0 ? <div className="text-center py-20 text-[#8c8a82] uppercase text-[10px] tracking-widest">No entries yet</div> : 
                                records.map((r, i) => (
                                    <ListItem key={r.id} record={r} index={i} total={records.length} onEdit={() => openEditModal(r)} />
                                ))}
                            </div>
                            {records.length > 0 && (
                                <div className="mt-12 sm:mt-18 text-center opacity-60"><br/>
                                    <p className="text-[8px] sm:text-[9px] text-[#b5b3aa] font-sans tracking-widest uppercase">Long press an item to edit or delete</p>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="w-full max-w-5xl flex flex-col flex-grow relative z-10 justify-center animate-fade-in py-4 sm:py-8">
                            <div className="w-full max-w-4xl bg-white shadow-2xl p-6 sm:p-12 border border-[#E5E2DA] mx-auto">
                                <header className="mb-10 sm:mb-14 mt-2 sm:mt-4 text-center">
                                    <p className="text-[7px] md:text-[8px] tracking-[0.3em] uppercase text-[#8c8a82] mb-2 font-sans">Options</p>
                                    <h2 className="text-lg md:text-xl tracking-widest font-light lowercase">settings</h2>
                                </header>
                                <div className="max-w-md mx-auto w-full space-y-6 sm:space-y-8 pb-4">
                                    
                                    <section className="space-y-4 sm:space-y-6">
                                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-[#8c8a82] border-b border-[#E5E2DA] pb-2 font-sans text-center">Cover Customization</h3>
                                        <div className="space-y-5 sm:space-y-6">
                                            <div>
                                                <div className="flex justify-center gap-4">
                                                    {COVER_COLORS.map(c => (
                                                        <button 
                                                            key={c.id} 
                                                            onClick={() => saveCoverSettings(c.value, coverDesign, coverTitle, coverSubtitle)}
                                                            className={`w-6 h-6 sm:w-8 sm:h-8 rounded-full border-2 ${coverColor === c.value ? 'border-[#d4af37] scale-110' : 'border-transparent'} hover:scale-110 transition-all`}
                                                            style={{ backgroundColor: c.value }}
                                                            title={c.name}
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-center gap-3 sm:gap-4 w-full">
                                                    {COVER_DESIGNS.map(d => (
                                                        <button
                                                            key={d.id}
                                                            onClick={() => saveCoverSettings(coverColor, d.id, coverTitle, coverSubtitle)}
                                                            className={`flex-1 py-2 px-2 sm:px-4 text-[8px] sm:text-[9px] uppercase tracking-widest font-sans border ${coverDesign === d.id ? 'border-[#3b3a36] bg-[#3b3a36] text-white' : 'border-[#E5E2DA] text-[#8c8a82] hover:border-[#3b3a36]'} transition-colors`}
                                                        >
                                                            {d.name}
                                                        </button>
                                                    ))}
                                                </div>
                                                
                                                {coverDesign === 'emblem' && (
                                                    <div className="mt-6 space-y-4 max-w-xs mx-auto animate-fade-in">
                                                        <div>
                                                            <label className="block text-[8px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans text-center">Title</label>
                                                            <input type="text" value={coverTitle} onChange={(e) => saveCoverSettings(coverColor, coverDesign, e.target.value, coverSubtitle)} placeholder="e.g. Passport" className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-center text-sm focus:outline-none" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-[8px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans text-center">Subtitle</label>
                                                            <input type="text" value={coverSubtitle} onChange={(e) => saveCoverSettings(coverColor, coverDesign, coverTitle, e.target.value)} placeholder="e.g. Personal Journal" className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-center text-xs focus:outline-none" />
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-4 sm:space-y-6 pt-2">
                                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-[#8c8a82] border-b border-[#E5E2DA] pb-2 font-sans text-center">Data Management</h3>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            <button onClick={handleExport} className="flex items-center justify-center gap-2 py-3 border border-[#E5E2DA] text-[#3b3a36] uppercase tracking-widest text-[9px] sm:text-[10px] font-sans hover:border-[#3b3a36] transition-all duration-300"><Icon name="download" size={14} />Backup</button>
                                            <button onClick={() => fileInputRef.current?.click()} className="flex items-center justify-center gap-2 py-3 border border-[#E5E2DA] text-[#3b3a36] uppercase tracking-widest text-[9px] sm:text-[10px] font-sans hover:border-[#3b3a36] transition-all duration-300"><Icon name="upload" size={14} />Restore</button>
                                            <input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" className="hidden" />
                                        </div>
                                    </section>
                                    <section className="pt-4 flex flex-col items-center">
                                        <div className="flex flex-col items-center justify-center gap-4 text-[#b5b3aa]">
                                            <a href="https://buymeacoffee.com/conizm" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-3 text-[#3b3a36] opacity-50 hover:opacity-100 transition-opacity">
                                                <span className="text-[9px] uppercase tracking-[0.2em] font-sans">SUPPORT</span>
                                            </a>
                                            <div className="text-[8px] tracking-widest uppercase font-sans opacity-60 flex gap-2">
                                                <span>v2.1</span>
                                                <span>by <a href="https://conizm.cc" target="_blank" rel="noopener noreferrer" className="hover:text-[#3b3a36] hover:opacity-100 transition-colors underline underline-offset-2">conizm_</a></span>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav 
                        className="fixed bottom-0 left-0 right-0 bg-[#F9F8F6]/80 backdrop-blur-md border-t border-[#DEDCD5] flex justify-center pt-4 sm:pt-6 z-40"
                        style={{ paddingBottom: 'calc(0.05rem + env(safe-area-inset-bottom))' }}
                    >
                        <div className="flex gap-12 md:gap-20 text-[11px] md:text-sm tracking-[0.2em] font-sans">
                            {['journal', 'destinations', 'settings'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t === 'destinations' ? 'list' : t)} className={`pb-1 transition-colors ${activeTab === (t === 'destinations' ? 'list' : t) ? 'border-b border-[#3b3a36] text-[#3b3a36]' : 'text-[#8c8a82] hover:text-[#3b3a36]'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[9999] flex justify-center items-center p-4">
                            <div className="absolute inset-0 bg-[#3b3a36]/20 backdrop-blur-sm" onClick={handleCloseModal}></div>
                            <div className="bg-[#F9F8F6] w-full max-w-md p-8 relative shadow-2xl border border-[#E5E2DA] z-10 animate-zoom-in">
                                <button onClick={handleCloseModal} className="absolute top-6 right-6 text-[#8c8a82] hover:text-[#3b3a36] transition-colors"><Icon name="x" size={24} /></button>
                                <h2 className="text-lg tracking-widest uppercase font-light mb-8 text-center border-b border-[#DEDCD5] pb-4">
                                    {editingRecord ? "Edit Stamp" : "New Stamp"}
                                </h2>
                                <form onSubmit={handleAdd} className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans">Country</label>
                                        <select value={country} onChange={e => setCountry(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none appearance-none cursor-pointer" required>
                                            <option value="" disabled>Select</option>
                                            {COUNTRIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    {country === 'Others' && <input type="text" value={customCountry} onChange={e => setCustomCountry(e.target.value)} placeholder="Country name" className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none" required />}
                                    {["Japan", "United States", "Canada"].includes(country) && (
                                        <select value={subRegion} onChange={e => setSubRegion(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none appearance-none cursor-pointer">
                                            <option value="">Select {country === 'Japan' ? 'Prefecture' : 'State'} (Optional)</option>
                                            {(country === 'Japan' ? JAPAN_PREFECTURES : country === 'United States' ? US_STATES : CA_PROVINCES).map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    )}
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans">Date</label>
                                        <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none font-sans cursor-pointer" required />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans">Stamp Frame</label>
                                        <select value={stampType} onChange={e => setStampType(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none appearance-none cursor-pointer font-sans" required>
                                            {!editingRecord && <option value="random">Random</option>}
                                            <option value="type-1">Design 1</option>
                                            <option value="type-2">Design 2</option>
                                            <option value="type-3">Design 3</option>
                                            <option value="type-4">Design 4</option>
                                            <option value="type-5">Design 5</option>
                                            <option value="type-6">Design 6</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col gap-2 pt-4">
                                        <button type="submit" disabled={!country} className="w-full py-4 border border-[#3b3a36] bg-[#3b3a36] text-white uppercase tracking-widest text-xs font-sans hover:bg-transparent hover:text-[#3b3a36] transition-all duration-300 disabled:opacity-30">
                                            {editingRecord ? "Save Changes" : "Stamp"}
                                        </button>
                                        
                                        {editingRecord && (
                                            <button type="button" onClick={() => {
                                                if (confirm("Are you sure you want to delete this stamp?")) {
                                                    handleRemove(editingRecord.id);
                                                    handleCloseModal();
                                                }
                                            }} className="w-full py-3 text-red-900/60 uppercase tracking-widest text-[10px] font-sans hover:text-red-900 transition-colors mt-2">
                                                Delete Stamp
                                            </button>
                                        )}
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
