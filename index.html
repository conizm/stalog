<body>
    <div id="initial-loader" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #F9F8F6; z-index: 9999;">
        <div style="width: 24px; height: 24px; border: 2px solid #E5E2DA; border-top-color: #3b3a36; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px;"></div>
        <p style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #8c8a82; animation: pulse-opacity 2s ease-in-out infinite;">
            Loading Travel Log
        </p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COUNTRIES = ["Japan", "United States", "Canada", "United Kingdom", "France", "Italy", "Spain", "Germany", "Australia", "New Zealand", "South Korea", "Taiwan", "Thailand", "Singapore", "Vietnam", "Switzerland", "Austria", "Sweden", "Finland", "Others"];
        const JAPAN_PREFECTURES = ["Hokkaido", "Aomori", "Iwate", "Miyagi", "Akita", "Yamagata", "Fukushima", "Ibaraki", "Tochigi", "Gunma", "Saitama", "Chiba", "Tokyo", "Kanagawa", "Niigata", "Toyama", "Ishikawa", "Fukui", "Yamanashi", "Nagano", "Gifu", "Shizuoka", "Aichi", "Mie", "Shiga", "Kyoto", "Osaka", "Hyogo", "Nara", "Wakayama", "Tottori", "Shimane", "Okayama", "Hiroshima", "Yamaguchi", "Tokushima", "Kagawa", "Ehime", "Kochi", "Fukuoka", "Saga", "Nagasaki", "Kumamoto", "Oita", "Miyazaki", "Kagoshima", "Okinawa"];
        const US_STATES = ["New York", "California", "Hawaii", "Florida", "Texas", "Illinois", "Pennsylvania", "Ohio", "Georgia", "North Carolina", "Michigan", "New Jersey", "Virginia", "Washington", "Arizona", "Massachusetts", "Tennessee", "Indiana", "Missouri", "Maryland", "Wisconsin", "Colorado", "Minnesota", "South Carolina", "Alabama", "Louisiana", "Kentucky", "Oregon", "Oklahoma", "Connecticut", "Utah", "Iowa", "Nevada", "Arkansas", "Mississippi", "Kansas", "New Mexico", "Nebraska", "Idaho", "West Virginia", "Others"];
        const CA_PROVINCES = ["Ontario", "Quebec", "British Columbia", "Alberta", "Manitoba", "Saskatchewan", "Nova Scotia", "New Brunswick", "Newfoundland and Labrador", "Prince Edward Island", "Northwest Territories", "Nunavut", "Yukon"];

        const formatDate = (dateString) => {
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const d = new Date(dateString);
            return isNaN(d.getTime()) ? "" : `${d.getDate().toString().padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
        };

        const generateStampStyle = () => {
            const types = ['circle', 'circle-single', 'rect', 'rect-double', 'rounded', 'rounded-double'];
            const colors = ['border-[#3b3a36] text-[#3b3a36]', 'border-[#5A4D41] text-[#5A4D41]', 'border-[#4A5D6B] text-[#4A5D6B]', 'border-[#525945] text-[#525945]', 'border-[#724840] text-[#724840]'];
            return {
                type: types[Math.floor(Math.random() * types.length)],
                rotation: Math.floor(Math.random() * 24) - 12,
                colorClass: colors[Math.floor(Math.random() * colors.length)],
            };
        };

        const Icon = ({ name, size = 16, strokeWidth = 1.5 }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                chevronLeft: <path d="m15 18-6-6 6-6" />,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const Stamp = ({ record }) => {
            const [isHovered, setIsHovered] = useState(false);
            const { type, rotation, colorClass } = record.style;
            
            let shapeClass = "";
            if (type.includes('circle')) shapeClass = `rounded-full w-16 h-16 sm:w-20 sm:h-20 md:w-28 md:h-28 flex flex-col justify-center items-center ${type.includes('single') ? 'border md:border-2' : 'border-[2px] md:border-[3px] border-double'}`;
            else if (type.includes('rect')) shapeClass = `w-20 h-14 sm:w-24 sm:h-16 md:w-32 md:h-20 flex flex-col justify-center items-center ${type.includes('double') ? 'border-[2px] md:border-[3px] border-double' : 'border md:border-2'}`;
            else shapeClass = `w-16 h-16 sm:w-20 sm:h-20 md:w-28 md:h-24 flex flex-col justify-center items-center rounded-xl ${type.includes('double') ? 'border-[2px] md:border-[3px] border-double' : 'border md:border-2'}`;

            const countryName = record.country;
            let fontSizeClass = "text-[9px] sm:text-xs md:text-base tracking-wider";
            if (countryName.length >= 13) fontSizeClass = "text-[6px] sm:text-[8px] md:text-[10px] tracking-tighter";
            else if (countryName.length >= 11) fontSizeClass = "text-[7px] sm:text-[9px] md:text-xs tracking-tight";
            else if (countryName.length >= 9) fontSizeClass = "text-[8px] sm:text-[10px] md:text-sm tracking-normal";

            return (
                <div 
                    className="relative flex justify-center items-center p-2 sm:p-4 transition-transform duration-500 select-none" 
                    style={{ transform: `rotate(${rotation}deg) scale(${isHovered ? 1.05 : 1}) translateZ(0)` }}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    onContextMenu={(e) => e.preventDefault()}
                >
                    <div className={`relative flex text-center p-1 sm:p-2 opacity-80 ${shapeClass} ${colorClass}`}>
                        <span className="text-[6px] sm:text-[8px] md:text-[10px] tracking-widest uppercase mb-0.5 sm:mb-1 opacity-70 font-sans">Visas</span>
                        <h3 className={`font-bold leading-tight uppercase px-1 ${fontSizeClass}`}>{record.country}</h3>
                        {record.subRegion && <span className="text-[8px] sm:text-[10px] md:text-xs italic mt-0.5 sm:mt-1 border-t border-current pt-0.5 sm:pt-1 px-1 sm:px-2">{record.subRegion}</span>}
                        <span className="text-[6px] sm:text-[8px] md:text-[9px] tracking-wider mt-1 sm:mt-2 font-mono">{formatDate(record.date)}</span>
                    </div>
                </div>
            );
        };

        const ListItem = ({ record, index, total, onRemove }) => {
            const timerRef = useRef(null);
            const posRef = useRef(null);

            const handlePressStart = (e) => {
                posRef.current = { 
                    x: e.touches ? e.touches[0].clientX : e.clientX, 
                    y: e.touches ? e.touches[0].clientY : e.clientY 
                };
                timerRef.current = setTimeout(() => {
                    if (confirm("Delete this destination?")) onRemove(record.id);
                }, 600);
            };

            const handlePressMove = (e) => {
                if (!posRef.current || !timerRef.current) return;
                const currentX = e.touches ? e.touches[0].clientX : e.clientX;
                const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                if (Math.abs(currentX - posRef.current.x) > 10 || Math.abs(currentY - posRef.current.y) > 10) {
                    clearTimeout(timerRef.current);
                    timerRef.current = null;
                }
            };

            const handlePressEnd = () => {
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                    timerRef.current = null;
                }
                posRef.current = null;
            };

            return (
                <div 
                    className="flex justify-between items-center py-3 sm:py-4 border-b border-[#E5E2DA]/60 transition-all select-none cursor-pointer"
                    onTouchStart={handlePressStart}
                    onTouchMove={handlePressMove}
                    onTouchEnd={handlePressEnd}
                    onMouseDown={handlePressStart}
                    onMouseMove={handlePressMove}
                    onMouseUp={handlePressEnd}
                    onMouseLeave={handlePressEnd}
                    onContextMenu={(e) => e.preventDefault()}
                >
                    <div className="flex items-baseline gap-2 sm:gap-4">
                        <span className="text-[9px] text-[#b5b3aa] font-sans w-4 text-right">{total - index}</span>
                        <div className="flex flex-col sm:flex-row sm:items-baseline gap-0.5 sm:gap-1">
                            <span className="text-xs sm:text-sm md:text-base tracking-wider uppercase">{record.country}</span>
                            {record.subRegion && <span className="text-[8px] sm:text-[10px] italic text-[#8c8a82] sm:ml-1">{record.subRegion}</span>}
                        </div>
                    </div>
                    <div className="flex items-center">
                        <span className="font-mono text-[8px] sm:text-[10px] text-[#5A4D41]">{formatDate(record.date)}</span>
                    </div>
                </div>
            );
        };

        function App() {
            const [records, setRecords] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [country, setCountry] = useState('');
            const [customCountry, setCustomCountry] = useState('');
            const [subRegion, setSubRegion] = useState('');
            const [date, setDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [currentPage, setCurrentPage] = useState(0);
            const [flipState, setFlipState] = useState(null);
            const [activeTab, setActiveTab] = useState('journal');
            const fileInputRef = useRef(null);

            const ITEMS_PER_SPREAD = 6;

            const sortRecordsDesc = (arr) => {
                return [...arr].sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
            };

            useEffect(() => {
                if (activeTab === 'journal' || activeTab === 'settings' || isModalOpen) {
                    document.body.style.overflow = 'hidden';
                    document.documentElement.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                    document.documentElement.style.overflow = '';
                }
                return () => {
                    document.body.style.overflow = '';
                    document.documentElement.style.overflow = '';
                };
            }, [activeTab, isModalOpen]);

            useEffect(() => {
                const saved = localStorage.getItem('zara-travel-log');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setRecords(sortRecordsDesc(parsed));
                }
                setIsLoaded(true);
                
                const loader = document.getElementById('initial-loader');
                if (loader) {
                    loader.classList.add('fade-out');
                    setTimeout(() => loader.remove(), 500);
                }
            }, []);

            const handleAdd = (e) => {
                e.preventDefault();
                const finalCountry = country === 'Others' ? customCountry : country;
                if (!finalCountry.trim()) return;

                const newRecord = {
                    id: crypto.randomUUID(),
                    country: finalCountry,
                    subRegion: ["Japan", "United States", "Canada"].includes(country) ? subRegion : '',
                    date,
                    style: generateStampStyle()
                };

                const newRecords = sortRecordsDesc([newRecord, ...records]);
                
                setRecords(newRecords);
                localStorage.setItem('zara-travel-log', JSON.stringify(newRecords));
                setCountry(''); setCustomCountry(''); setSubRegion(''); setDate(new Date().toISOString().split('T')[0]);
                setIsModalOpen(false); setCurrentPage(0); setActiveTab('journal');
            };

            const handleRemove = (id) => {
                const filtered = records.filter(r => r.id !== id);
                setRecords(filtered);
                localStorage.setItem('zara-travel-log', JSON.stringify(filtered));
            };

            const handleExport = () => {
                const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `travel-log-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            if (confirm("既存のデータを上書きしますか？")) {
                                const sorted = sortRecordsDesc(imported);
                                setRecords(sorted);
                                localStorage.setItem('zara-travel-log', JSON.stringify(sorted));
                                setCurrentPage(0); setActiveTab('journal');
                            }
                        }
                    } catch (e) { alert("不正なファイルです。"); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const totalPages = Math.max(1, Math.ceil(records.length / ITEMS_PER_SPREAD));
            const nextPage = () => {
                if (currentPage >= totalPages - 1 || flipState) return;
                setFlipState({ direction: 'next', from: currentPage, to: currentPage + 1 });
                setTimeout(() => { setCurrentPage(p => p + 1); setFlipState(null); }, 600);
            };
            const prevPage = () => {
                if (currentPage <= 0 || flipState) return;
                setFlipState({ direction: 'prev', from: currentPage, to: currentPage - 1 });
                setTimeout(() => { setCurrentPage(p => p - 1); setFlipState(null); }, 600);
            };

            const handleNotebookClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                if (x > rect.width / 2) {
                    nextPage();
                } else {
                    prevPage();
                }
            };

            const stampPositions = [
                { left: '30%', top: '22%' }, { left: '70%', top: '22%' },
                { left: '30%', top: '50%' }, { left: '70%', top: '50%' },
                { left: '30%', top: '78%' }, { left: '70%', top: '78%' },
            ];

            const PageContent = ({ pageIndex }) => {
                const start = pageIndex * ITEMS_PER_SPREAD;
                const pageRecords = records.slice(start, start + ITEMS_PER_SPREAD);

                return (
                    <div className="absolute inset-0 overflow-hidden w-full h-full pointer-events-none">
                        {pageRecords.length === 0 && pageIndex === 0 ? (
                            <div className="absolute inset-0 flex flex-col justify-center items-center text-[#8c8a82] opacity-50 px-4 text-center">
                                <p className="text-xs tracking-widest uppercase mb-2">No entries yet</p>
                                <p className="text-[10px] font-sans mb-1">Click + to add a stamp.</p>
                                <p className="text-[8px] font-sans opacity-70">Tap right to flip page.</p>
                            </div>
                        ) : (
                            pageRecords.map((record, idx) => (
                                <div key={record.id} className="absolute flex justify-center items-center" style={{ left: stampPositions[idx % 6].left, top: stampPositions[idx % 6].top, transform: 'translate(-50%, -50%)' }}>
                                    <Stamp record={record} />
                                </div>
                            ))
                        )}
                    </div>
                );
            };

            if (!isLoaded) return null;

            return (
                <div className="min-h-screen pb-24 flex flex-col items-center py-8 px-4 relative overflow-x-hidden animate-in fade-in duration-500">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden opacity-[0.02] flex justify-center items-center z-0">
                         <div className="w-[150%] h-[150%] border-[40px] border-[#3b3a36] rounded-full mix-blend-multiply blur-xl"></div>
                    </div>

                    <button onClick={() => setIsModalOpen(true)} className="fixed top-4 right-4 md:top-8 md:right-8 w-10 h-10 md:w-12 md:h-12 flex justify-center items-center border border-[#3b3a36] rounded-full text-[#3b3a36] hover:bg-[#3b3a36] hover:text-white transition-all duration-500 z-30 bg-white shadow-sm"><Icon name="plus" size={20} /></button>

                    {activeTab === 'journal' && (
                        <div className="w-full max-w-5xl flex flex-col flex-grow relative z-10 justify-center">
                            <header className="mb-2 mt-2 text-center relative">
                                <p className="text-[8px] md:text-[9px] tracking-[0.3em] uppercase text-[#8c8a82] mb-2 font-sans">Personal Journal</p>
                                <h1 className="text-xl md:text-2xl tracking-widest uppercase font-light">Travel Log</h1>
                                <div className="w-8 h-[1px] bg-[#3b3a36] mx-auto mt-4"></div>
                            </header>

                            <div className="relative w-full px-2 sm:px-8 flex items-center justify-center flex-grow">
                                <div className="w-full max-w-[360px] sm:max-w-[420px] md:max-w-[480px] aspect-[3/4] min-h-[450px] max-h-[75vh] bg-white shadow-2xl rounded-r-xl rounded-l-sm relative border border-[#E5E2DA] border-l-[#d5d2c4] overflow-hidden mx-auto cursor-pointer" 
                                    onClick={handleNotebookClick}
                                >
                                    
                                    <div className="absolute inset-0 z-10" style={{ transformStyle: 'preserve-3d' }}>
                                        <div className="absolute inset-0 bg-white shadow-[inset_15px_0_20px_-15px_rgba(0,0,0,0.05)]">
                                            <PageContent pageIndex={flipState?.direction === 'next' ? flipState.to : (flipState?.direction === 'prev' ? flipState.from : currentPage)} />
                                        </div>
                                    </div>

                                    {flipState && (
                                        <div className="absolute inset-0 flex z-30 pointer-events-none perspective-[1200px]">
                                            {flipState.direction === 'next' ? (
                                                <div className="absolute inset-0 page-flip-next">
                                                    <div className="page-front bg-white shadow-[inset_15px_0_20px_-15px_rgba(0,0,0,0.05)]">
                                                        <PageContent pageIndex={flipState.from} />
                                                    </div>
                                                    <div className="page-back bg-white border-l border-[#e0ddcd] shadow-[inset_-15px_0_20px_-15px_rgba(0,0,0,0.05)]">
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="absolute inset-0 page-flip-prev">
                                                    <div className="page-front bg-white shadow-[inset_15px_0_20px_-15px_rgba(0,0,0,0.05)]">
                                                        <PageContent pageIndex={flipState.to} />
                                                    </div>
                                                    <div className="page-back bg-white border-l border-[#e0ddcd] shadow-[inset_-15px_0_20px_-15px_rgba(0,0,0,0.05)]">
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div className="absolute left-0 top-0 bottom-0 w-[1px] bg-[#d5d2c4] z-40 mix-blend-multiply"></div>
                                    <div className="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-[rgba(0,0,0,0.06)] to-transparent z-40 pointer-events-none"></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'list' && (
                        <div className="w-full max-w-4xl bg-white shadow-2xl p-6 sm:p-12 border border-[#E5E2DA] animate-in fade-in duration-500 z-10 my-8">
                            <header className="mb-10 mt-4 text-center relative">
                                <p className="text-[8px] md:text-[9px] tracking-[0.3em] uppercase text-[#8c8a82] mb-2 font-sans">Index</p>
                                <h2 className="text-xl md:text-2xl tracking-widest uppercase font-light">destinations</h2>
                                <div className="w-8 h-[1px] bg-[#3b3a36] mx-auto mt-4 mb-4"></div>
                                <p className="text-[8px] sm:text-[9px] text-[#b5b3aa] font-sans tracking-widest uppercase absolute w-full text-center bottom-[-24px]">Long press an item to delete</p>
                            </header>
                            <div className="grid grid-cols-1 max-w-2xl mx-auto w-full pt-4">
                                {records.length === 0 ? <div className="text-center py-20 text-[#8c8a82] uppercase text-[10px] tracking-widest">No entries yet</div> : 
                                records.map((r, i) => (
                                    <ListItem key={r.id} record={r} index={i} total={records.length} onRemove={handleRemove} />
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="w-full max-w-5xl flex flex-col flex-grow relative z-10 justify-center animate-in fade-in duration-500">
                            <div className="w-full max-w-4xl bg-white shadow-2xl p-6 sm:p-12 border border-[#E5E2DA] mx-auto">
                                <header className="mb-12 mt-4 text-center">
                                    <p className="text-[8px] md:text-[9px] tracking-[0.3em] uppercase text-[#8c8a82] mb-2 font-sans">Options</p>
                                    <h2 className="text-xl md:text-2xl tracking-widest uppercase font-light">Settings</h2>
                                    <div className="w-8 h-[1px] bg-[#3b3a36] mx-auto mt-4"></div>
                                </header>
                                <div className="max-w-md mx-auto w-full space-y-8 pb-4">
                                    <section className="space-y-6">
                                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-[#8c8a82] border-b border-[#E5E2DA] pb-2 font-sans">Data Management</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <button onClick={handleExport} className="flex items-center justify-center gap-3 py-3 border border-[#3b3a36] text-[#3b3a36] uppercase tracking-widest text-[10px] font-sans hover:bg-[#3b3a36] hover:text-white transition-all duration-500"><Icon name="download" size={14} />Backup</button>
                                            <button onClick={() => fileInputRef.current?.click()} className="flex items-center justify-center gap-3 py-3 border border-[#3b3a36] text-[#3b3a36] uppercase tracking-widest text-[10px] font-sans hover:bg-[#3b3a36] hover:text-white transition-all duration-500"><Icon name="upload" size={14} />Restore</button>
                                            <input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" className="hidden" />
                                        </div>
                                    </section>
                                    <section className="space-y-4 pt-4">
                                        <h3 className="text-[10px] uppercase tracking-[0.2em] text-[#8c8a82] border-b border-[#E5E2DA] pb-2 font-sans">About</h3>
                                        <p className="text-[11px] text-[#b5b3aa] font-sans leading-relaxed">Travel Log v2.0 — Your data is stored locally. Use Backup to save your journey before switching devices.</p>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* セーフエリアに対応させたフッターメニュー */}
                    <nav 
                        className="fixed bottom-0 left-0 right-0 bg-[#F9F8F6]/80 backdrop-blur-md border-t border-[#DEDCD5] flex justify-center pt-4 sm:pt-6 z-40"
                        style={{ paddingBottom: 'calc(0.05rem + env(safe-area-inset-bottom))' }}
                    >
                        <div className="flex gap-12 md:gap-20 text-[10px] md:text-xs tracking-[0.2em] font-sans">
                            {['journal', 'destinations', 'settings'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t === 'destinations' ? 'list' : t)} className={`pb-1 transition-colors ${activeTab === (t === 'destinations' ? 'list' : t) ? 'border-b border-[#3b3a36] text-[#3b3a36]' : 'text-[#8c8a82] hover:text-[#3b3a36]'}`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex justify-center items-center p-4">
                            <div className="absolute inset-0 bg-[#3b3a36]/20 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-[#F9F8F6] w-full max-w-md p-8 relative shadow-2xl border border-[#E5E2DA] z-10 animate-in fade-in zoom-in-95 duration-300">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-6 right-6 text-[#8c8a82] hover:text-[#3b3a36] transition-colors"><Icon name="x" size={24} /></button>
                                <h2 className="text-xl tracking-widest uppercase font-light mb-8 text-center border-b border-[#DEDCD5] pb-4">New Stamp</h2>
                                <form onSubmit={handleAdd} className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans">Country</label>
                                        <select value={country} onChange={e => setCountry(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none appearance-none cursor-pointer" required>
                                            <option value="" disabled>Select</option>
                                            {COUNTRIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    {country === 'Others' && <input type="text" value={customCountry} onChange={e => setCustomCountry(e.target.value)} placeholder="Country name" className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none" required />}
                                    {["Japan", "United States", "Canada"].includes(country) && (
                                        <select value={subRegion} onChange={e => setSubRegion(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none appearance-none cursor-pointer" required>
                                            <option value="" disabled>Select {country === 'Japan' ? 'Prefecture' : 'State'}</option>
                                            {(country === 'Japan' ? JAPAN_PREFECTURES : country === 'United States' ? US_STATES : CA_PROVINCES).map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    )}
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest text-[#8c8a82] mb-1 font-sans">Date</label>
                                        <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full bg-transparent border-b border-[#DEDCD5] py-2 text-lg focus:outline-none font-sans cursor-pointer" required />
                                    </div>
                                    <button type="submit" disabled={!country} className="w-full py-4 mt-4 border border-[#3b3a36] bg-[#3b3a36] text-white uppercase tracking-widest text-xs font-sans hover:bg-transparent hover:text-[#3b3a36] transition-all duration-300 disabled:opacity-30">Stamp</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
